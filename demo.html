<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#05040a">
  <title>Compilador Mágico - Grimório Arcano</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
    
    body { margin: 0; background-color: #05040a; font-family: 'Lora', serif; color: #e0d8c0; }
    
    /* Scrollbars Arcanos */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0812; border-left: 1px solid #1a1525; }
    ::-webkit-scrollbar-thumb { background: #3a2f4c; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #d4af37; }

    .draggable-item { 
      padding: 12px 16px; margin-bottom: 12px; 
      background: rgba(30, 25, 45, 0.4); 
      backdrop-filter: blur(4px);
      border: 1px solid rgba(212, 175, 55, 0.1); 
      border-radius: 10px; 
      cursor: grab; 
      text-align: left; 
      font-size: 0.85rem; 
      font-weight: 500; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; justify-content: space-between;
      color: rgba(200, 185, 158, 0.8);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .draggable-item:hover { 
      background: rgba(58, 47, 76, 0.6); 
      transform: translateX(4px); 
      border-color: rgba(212, 175, 55, 0.5); 
      color: #f5eedc; 
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); 
    }
    .draggable-item:active { cursor: grabbing; transform: scale(0.98); }
    .core-item { border-left: 3px solid #e84118; }
    .subcircle-item { border-left: 3px solid #e84393; text-align: center; justify-content: center; }
    
    .sidebar h2 {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      position: relative;
    }
    .sidebar h2::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 25%; right: 25%; height: 1px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }

    .top-actions {
      display: flex;
      gap: 12px;
    }
    
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    
    .canvas-container { 
      border: 2px dashed rgba(212, 175, 55, 0.1); border-radius: 8px; transition: border-color 0.3s; 
      position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; 
      background: radial-gradient(circle, #0a0812 0%, #030205 100%); 
      box-shadow: inset 0 0 50px rgba(0,0,0,0.8); 
      aspect-ratio: 1 / 1; width: 100%; max-height: 60vh;
      touch-action: none;
    }
    .canvas-container.editing { border-color: rgba(212, 175, 55, 0.3); }
    .canvas-container.drag-over { border-color: #d4af37; background: rgba(212, 175, 55, 0.05); box-shadow: inset 0 0 80px rgba(212, 175, 55, 0.1); }
    
    .breadcrumb { display: flex; gap: 8px; align-items: center; }
    .breadcrumb-item { cursor: pointer; color: #d4af37; font-weight: bold; background: rgba(26, 21, 37, 0.8); padding: 4px 12px; border-radius: 4px; border: 1px solid #3a2f4c; font-family: 'Cinzel', serif; transition: all 0.2s; }
    .breadcrumb-item:hover { background: #d4af37; color: #05040a; box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
    .breadcrumb-separator { color: #5a4b70; }
    
    .interactive-element { cursor: pointer; transition: filter 0.2s; }
    .interactive-element:hover { filter: brightness(1.5) drop-shadow(0 0 8px rgba(212,175,55,0.4)); }
    .ui-btn { fill: rgba(26, 21, 37, 0.9); stroke: #d4af37; stroke-width: 1; }
    .ui-btn:hover { fill: #d4af37; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .action-btn { background: linear-gradient(145deg, #1a1525, #0a0812); color: #c8b99e; border: 1px solid #3a2f4c; padding: 8px 16px; border-radius: 4px; font-weight: bold; font-family: 'Cinzel', serif; cursor: pointer; transition: all 0.3s; gap: 6px; align-items: center; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    .action-btn:hover { background: linear-gradient(145deg, #2a223a, #1a1525); border-color: #d4af37; color: #f5eedc; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
    .action-btn.primary { background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), #0a0812); border-color: #d4af37; color: #d4af37; }
    .action-btn.primary:hover { background: linear-gradient(145deg, rgba(212, 175, 55, 0.3), #1a1525); color: #f5eedc; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
    .toggle-btn { background: linear-gradient(145deg, #d4af37, #b58f20); color: #05040a; border: 1px solid #f5eedc; padding: 10px 24px; border-radius: 4px; font-weight: bold; font-family: 'Cinzel', serif; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
    .toggle-btn:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5); }
    .runic-text { font-family: 'Cinzel', serif; font-size: 1.5rem; color: #d4af37; text-shadow: 0 0 5px rgba(212,175,55,0.3); }

    .metadata-inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
    .spell-input { background: transparent; border: none; border-bottom: 2px solid #3a2f4c; color: #d4af37; font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: bold; padding: 4px 8px; outline: none; transition: border-color 0.3s; text-shadow: 0 0 10px rgba(212, 175, 55, 0.2); width: 100%; box-sizing: border-box; }
    .spell-input:focus { border-color: #d4af37; }
    .spell-textarea { background: rgba(10, 8, 18, 0.6); border: 1px solid #3a2f4c; color: #c8b99e; font-family: 'Lora', serif; font-size: 1rem; padding: 12px; border-radius: 4px; outline: none; resize: vertical; min-height: 60px; line-height: 1.5; font-style: italic; width: 100%; box-sizing: border-box; }
    .spell-textarea:focus { border-color: #d4af37; background: rgba(26, 21, 37, 0.8); }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,4,10,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
    .modal-content { background: linear-gradient(145deg, #0a0812, #05040a); border: 2px solid #d4af37; border-radius: 8px; padding: 2rem; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(212,175,55,0.2); }
    .grimoire-item { background: rgba(26, 21, 37, 0.8); padding: 12px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3a2f4c; transition: all 0.3s; }
    .grimoire-item:hover { border-color: #d4af37; background: rgba(58, 47, 76, 0.9); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); }
    .grimoire-title { font-weight: bold; font-size: 1.2rem; color: #d4af37; margin: 0 0 4px 0; font-family: 'Cinzel', serif; }
    .grimoire-date { font-size: 0.8rem; color: #c8b99e; margin: 0; font-style: italic; }

    @keyframes spin-dashed { 100% { transform: rotate(360deg); } }
    @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
    @keyframes pulse-glow { 0% { filter: drop-shadow(0 0 5px #00d2ff); } 100% { filter: drop-shadow(0 0 15px #00d2ff); } }
    @keyframes bar-slide-up {
      from { transform: translate(-50%, 50px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    .spin-ring { animation: spin-dashed 60s linear infinite; }
    .spin-ring-fast { animation: spin-reverse 30s linear infinite; }
    .spin-ring-slow { animation: spin-dashed 120s linear infinite; }
    .kernel-pulse { animation: pulse-glow 2s ease-in-out infinite alternate; }
    
    .codex-panel {
      background: linear-gradient(145deg, rgba(20, 18, 30, 0.98), rgba(10, 8, 18, 1));

      border-radius: 20px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 30px 80px rgba(0,0,0,0.9), inset 0 0 40px rgba(212,175,55,0.08);

      margin-top: 2rem;
    }
    
    @media (max-width: 768px) {
      .codex-panel { padding: 20px; border-radius: 12px; margin-top: 1.5rem; }
      .main-content { padding: 1rem; }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 10px;
      padding: 12px;

      gap: 4px;

    .stat-card:hover {

      border-color: rgba(212, 175, 55, 0.4);
      transform: translateY(-2px);

    .stat-value {

      font-size: 1.2rem;
      color: #fff;
      font-weight: bold;

    .config-toggles {

      border: 1px solid rgba(212, 175, 55, 0.1);

    .config-item {
      display: flex;
      flex-direction: column;
      gap: 10px;

    .config-label {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: rgba(212, 175, 55, 0.9);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: bold;
    }

    .node-action-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 15, 25, 0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 20px;
      padding: 16px 32px;
      display: flex;
      gap: 24px;
      align-items: center;
      z-index: 3000;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 40px rgba(212,175,55,0.15);
      max-width: 95vw;
      animation: bar-slide-up 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      transition: all 0.3s;

    .node-action-bar::-webkit-scrollbar { display: none; }
    .hover-highlight:hover {
      background: rgba(212, 175, 55, 0.05) !important;
      border-color: rgba(212, 175, 55, 0.3) !important;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
    }
    
    .action-group { 
      display: flex; 
      gap: 16px; 
      align-items: center; 
      border-right: 1px solid rgba(212, 175, 55, 0.2); 
      padding-right: 24px; 
      height: 100%;
    }
    .action-group:last-child { border-right: none; padding-right: 0; }
    .action-label { 
      font-family: 'Cinzel', serif; 
      font-size: 0.65rem; 
      color: rgba(212, 175, 55, 0.8); 
      margin-bottom: 6px; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .mini-btn {
      background: rgba(40, 35, 60, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: #e0d8c0;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: bold;
      position: relative;
    }
    .mini-btn:hover { 
      border-color: #d4af37; 
      color: #fff; 
      background: rgba(58, 47, 76, 0.9); 
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212,175,55,0.25);
    }
    .mini-btn:active { transform: translateY(0); }
    .mini-btn.danger { color: #ff5e57; border-color: rgba(255, 94, 87, 0.2); }
    .mini-btn.danger:hover { background: #ff5e57; color: #fff; border-color: #ff5e57; box-shadow: 0 4px 15px rgba(255, 94, 87, 0.4); }
    .mini-btn.success { color: #1dd1a1; border-color: rgba(29, 209, 161, 0.2); }
    .mini-btn.success:hover { background: #1dd1a1; color: #fff; border-color: #1dd1a1; box-shadow: 0 4px 15px rgba(29, 209, 161, 0.4); }
    .mini-btn.text-btn { 
      width: auto; 
      padding: 0 16px; 
      font-size: 0.75rem; 
      font-family: 'Cinzel', serif; 
      text-transform: uppercase;
      letter-spacing: 0.5px;

    @media (max-width: 1024px) {
      .node-action-bar { bottom: 85px; padding: 10px 18px; gap: 12px; border-radius: 12px; }
      .action-group { padding-right: 12px; gap: 8px; }
      .mini-btn { width: 34px; height: 34px; border-radius: 6px; }

    .app-container { 
      display: flex; height: 100vh; width: 100vw; overflow: hidden; 
      flex-direction: row; background-color: #05040a; 
    }
    .sidebar { 
      width: 360px; 
      background: #08070d;
      border-right: 1px solid rgba(212, 175, 55, 0.15); 
      padding: 2.5rem; 
      overflow-y: auto; 
      flex-shrink: 0; 
      z-index: 10; 
      box-shadow: 20px 0 50px rgba(0,0,0,0.7);

    .main-content {

      background-color: transparent; overflow-y: auto; position: relative;

      position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;

      touch-action: none;
    }
    .canvas-container.editing { border-color: rgba(212, 175, 55, 0.4); box-shadow: inset 0 0 100px rgba(10, 8, 18, 0.8), 0 25px 80px rgba(0,0,0,0.8); }
    
    .top-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .action-btn { 
      background: rgba(26, 21, 37, 0.6); 
      backdrop-filter: blur(4px);
      color: #c8b99e; 
      border: 1px solid rgba(58, 47, 76, 0.8); 
      padding: 10px 18px; 
      border-radius: 8px; 
      font-weight: 600; 
      font-family: 'Cinzel', serif; 
      cursor: pointer; 
      transition: all 0.3s;

    }
    .action-btn:hover { 
      background: rgba(58, 47, 76, 0.8); 
      border-color: rgba(212, 175, 55, 0.5); 
      color: #f5eedc; 
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);

    @media (max-width: 1024px) {
      .app-container { flex-direction: column; overflow: hidden; display: flex; height: 100vh; position: relative; }
      .sidebar { 
        position: fixed;
        top: 0;

        width: 280px;
        height: 100vh;
        z-index: 2000;

        top: 0;

        z-index: 1900;
        display: none;
        backdrop-filter: blur(2px);
      }
      .sidebar-overlay.active {
        display: block;
      }
      .mobile-sidebar-toggle {
        display: flex !important;
        position: fixed;
        bottom: 25px;

        z-index: 2100;

        height: 56px;
        background: #d4af37;

        justify-content: center;
        align-items: center;
        color: #05040a;

      }
      .mobile-sidebar-toggle:active { transform: scale(0.9); }
      
      .main-content { padding: 1.5rem; overflow-y: auto; height: 100vh; flex: 1; }

      .toggle-btn { width: 100%; padding: 16px; font-size: 1.1rem; min-height: 56px; margin-top: 5px; }
      .canvas-container { border-width: 1px; min-height: 380px; flex: none; height: 65vh; margin-bottom: 1rem; border-radius: 12px; }
      .breadcrumb { font-size: 0.85rem; gap: 8px; overflow-x: auto; white-space: nowrap; padding: 12px 0; border-bottom: 1px solid rgba(212,175,55,0.1); margin-bottom: 10px; }

    @media (max-width: 480px) {
      .canvas-container { height: 50vh; min-height: 300px; }
      .top-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .action-btn { min-width: 0; padding: 8px 4px; }

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { 
      NodeType, CoreElement, AdditiveType, KernelType, EdgeType,
      CoreRunes, AdditiveRunes, EdgeCycle, EdgeSymbols,
      AdditiveDescriptions, NodeAttributesDict
    } from './src/magicConstants.js';

    const { useState, useEffect, useMemo, useRef } = React;

    class MagicLexer {
      static tokenize(jsonStr) {
        try {
          const graph = JSON.parse(jsonStr);
          if (!graph || !graph.nodes || graph.nodes.length === 0) return null;
          
          // O Lexer (neste protótipo) extrai e organiza os tokens do AST visual (JSON)
          return graph;
        } catch (e) {
          console.error("Lexical error:", e);
          return null;
        }
      }
    }

    class MagicCompiler {
      static _compileInternal(graph) {
        const core = graph.nodes.find(n => n.type === NodeType.CORE);
        if (!core) return null;

        let attrs = { ...(NodeAttributesDict[core.element] || {}), tags: [...(NodeAttributesDict[core.element]?.tags || [])] };
        const instabilities = [];
        const logs = [];

        const layers = [...new Set(graph.nodes.map(n => n.layer || 0))].sort();
        
        layers.forEach(L => {
          const nodes = graph.nodes.filter(n => n.layer === L && n.type !== NodeType.CORE);
          nodes.forEach(node => {
            // Implicações Estruturais e Multiplicadores
            const attributionEdges = graph.edges.filter(e => e.type === EdgeType.ATRIBUICAO && e.targetId === node.id);
            attributionEdges.forEach(edge => {
              const source = graph.nodes.find(n => n.id === edge.sourceId);
              if (source) {
                const sourceAttrs = source.type === NodeType.SUBCIRCLE ? MagicCompiler._compileInternal(source.magicGraph)?.attrs : NodeAttributesDict[source.additiveType];
                if (sourceAttrs) {
                  // Se a fonte for um algarismo romano, multiplicamos em vez de somar
                  if (sourceAttrs.magnitude) {
                    let base = NodeAttributesDict[node.additiveType] || {};
                    node.tempAttrs = this.multiply(base, sourceAttrs.magnitude);
                  } else {
                    node.tempAttrs = this.merge(node.tempAttrs || NodeAttributesDict[node.additiveType] || {}, sourceAttrs);
                  }
                }
              }
            });
          });

          nodes.forEach(node => {
            let nodeAttrs = node.tempAttrs || NodeAttributesDict[node.additiveType] || {};
            let isPropertyOnly = false;

            // Se o nó estiver conectado ao NÚCLEO via ATRIBUIÇÃO (--o), extraímos apenas as propriedades numéricas
            const toCoreEdge = graph.edges.find(e => e.type === EdgeType.ATRIBUICAO && e.sourceId === node.id && e.targetId === core.id);
            if (toCoreEdge) isPropertyOnly = true;

            if (node.type === NodeType.SUBCIRCLE || node.type === NodeType.KERNEL) {
              const sub = MagicCompiler._compileInternal(node.magicGraph);
              if (sub) {
                nodeAttrs = { ...sub.attrs };
                if (node.type === NodeType.KERNEL) {
                  // Regra do Kernel: Perde identidade elemental e vira buffer semântico
                  delete nodeAttrs.damageType;
                  delete nodeAttrs.healing;
                  delete nodeAttrs.baseDamage;
                  
                  // Se for Kernel, forçamos os atributos do seu tipo de buffer
                  const kernelBase = NodeAttributesDict[node.additiveType] || {};
                  nodeAttrs = this.merge(nodeAttrs, kernelBase, true);
                  nodeAttrs.isKernelBuffer = true;
                }
                (sub.instabilities || []).forEach(i => instabilities.push(i));
              }
            }
            
            attrs = this.merge(attrs, nodeAttrs, isPropertyOnly);
          });
        });

        const t = attrs.tags || [];

        // Combinações Rúnicas (Junções)
        if (t.includes('Fogo') && t.includes('Terra')) { attrs.damageType = 'lava'; attrs.thermal += 4; }
        if (t.includes('Fogo') && t.includes('Ar')) { attrs.damageType = 'combustão/eletricidade'; attrs.potency += 3; }
        if (t.includes('Água') && t.includes('Terra')) { attrs.damageType = 'lodo/madeira'; attrs.mass += 5; }
        if (t.includes('Água') && t.includes('Ar')) { attrs.damageType = 'nuvem'; attrs.stealth += 4; }
        if (t.includes('Luz') && t.includes('Composição')) { attrs.damageType = 'vida/cura'; attrs.healing = '2d6'; }
        if (t.includes('Luz') && t.includes('Decomposição')) { attrs.damageType = 'ilusão/contramágica'; attrs.stealth += 5; }
        if (t.includes('Sombra') && t.includes('Decomposição')) { attrs.damageType = 'morte/drenar'; attrs.potency += 6; }
        if (t.includes('Sombra') && t.includes('Composição')) { attrs.damageType = 'maldição'; attrs.debuffs = [...(attrs.debuffs || []), 'amaldiçoado']; }

        // Regra do Triângulo (Base estável)
        if (graph.nodes.length < 3) instabilities.push('Magia instável: Menos de 3 componentes detectados (Pilar do Triângulo ausente).');

        // Gera a Descrição da Magia de forma automatizada pelo compilador
        const level = 1 + Math.floor((attrs.complexity || 0) / 3);
        const effectType = attrs.healing ? 'restaurador' : 'destrutivo';
        const actionType = attrs.mass > 10 ? 'Ritualística' : 'Pronta-Ação';
        const rangeText = attrs.potency > 5 ? 'projetada à distância' : 'manifestada em curto alcance';
        
        let visualText = attrs.lumen <= 0 ? "oculta aos olhos profanos" : "brilhante e visível";
        let heatText = "uma temperatura ambiente neutra";
        if ((attrs.thermal || 0) > 3) heatText = "fótons de plasma incandescente";
        if ((attrs.thermal || 0) < -3) heatText = "um turbilhão de estilhaços glaciais";
        
        let densityText = "leveza maleável e volátil";
        if ((attrs.mass || 0) > 20) densityText = "uma gravidade anomalamente densa, distorcendo o solo";
        
        let patternText = "meticulosamente controlada pelo tecelão";
        if ((attrs.chaos || 0) > 3) patternText = "caótica e errática, com fagulhas imprevisíveis";

        const magicDescription = `Pela matriz do elemento ${core.element}, a equação resultou em um fluxo de energia ${effectType} classificado como Poder Nível ${level}. Seu vetor de ativação é de escala ${actionType}, e sua área de convergência será ${rangeText}.
Fisicamente, a magia emite ${heatText}. Sua interação barométrica com o cenário provoca ${densityText}. A ressonância interna provou-se ${patternText}, produzindo uma aura ${visualText}.`;
        
        logs.push({ action: 'Compile Success', description: magicDescription, timestamp: new Date().toISOString() });

        return { attrs, instabilities, logs, element: core.element, description: magicDescription };
      }

      static compile(tokens) {
        if (!tokens) return null;
        
        const graph = tokens; // O objeto de AST que veio do lexer
        const result = this._compileInternal(graph);
        if (!result) return null;

        // Retorna JSON serializado do compilador (Simulando uma API/Worker puro)
        return JSON.stringify(result);
      }

      static merge(a, b, propertyOnly = false) {
        if (!a) return b || {};
        if (!b) return a || {};
        
        // Se for um subciclo (KERNEL), ele perde a identidade elemental e vira semântico
        const isKernel = b.isKernelBuffer;
        const res = { ...a, tags: [...new Set([...(a.tags || []), ...(b.tags || [])])] };
        
        const keys = ['thermal', 'entropy', 'morphology', 'volume', 'strength', 'wave', 'sonic', 'lumen', 'order', 'chaos', 'potency', 'complexity', 'mass', 'velocity'];
        keys.forEach(k => res[k] = (a[k] || 0) + (b[k] || 0));
        
        if (!propertyOnly && !isKernel) {
          res.damageType = b.damageType || a.damageType;
          res.baseDamage = b.baseDamage || a.baseDamage;
          res.healing = b.healing || a.healing;
        }
        
        res.debuffs = [...new Set([...(a.debuffs || []), ...(b.debuffs || [])])];
        if (b.duration) res.duration = b.duration;
        return res;
      }
    }

    const MagicPipeline = {
      run: (graphObject) => {
        // 1. demo.html -> JSON
        const inputJson = JSON.stringify(graphObject);
        // 2. json -> lexer
        const tokens = MagicLexer.tokenize(inputJson);
        // 3. lexer -> compilador
        const outputJson = MagicCompiler.compile(tokens);

    const DraggableItem = ({ type, name, label, className, onAdd }) => {

      return (
        <div

          draggable 
          onDragStart={handleDragStart}

            e.preventDefault();

          style={{ cursor: 'pointer', userSelect: 'none', touchAction: 'manipulation' }}
        >
          <span style={{ pointerEvents: 'none', flex: 1 }}>{label || name}</span>
          {rune && <span className="runic-text" style={{ marginLeft: '8px', pointerEvents: 'none' }}>{rune}</span>}

      );
    };

    const getNodeRadius = (graph, nodeId) => {
      const node = graph.nodes.find(n => n.id === nodeId);
      if (!node) return 35;
      if (node.type === NodeType.ADDITIVE) return 35;
      return 45;
    };

    const EdgeVisual = ({ edge, pos1, pos2, r1, r2, viewMode, edgeColorMode, customEdgeColor, onEdgeClick, onEdgeDelete }) => {
      const dx = pos2.x - pos1.x;
      const dy = pos2.y - pos1.y;
      const length = Math.sqrt(dx*dx + dy*dy) || 1;
      
      const startX = pos1.x + (dx/length) * r1;
      const startY = pos1.y + (dy/length) * r1;
      const endX = pos2.x - (dx/length) * r2;
      const endY = pos2.y - (dy/length) * r2;
      const angle = Math.atan2(dy, dx) * (180 / Math.PI);
      const midX = (pos1.x + pos2.x) / 2;
      const midY = (pos1.y + pos2.y) / 2;

      let strokeDasharray = '', strokeWidth = 3, stroke = '#7f8fa6';
      let startMarker = null, endMarker = null;
      let isDoubleLine = false;

      if (edgeColorMode === 'custom') {
        stroke = customEdgeColor;
      } else {
        switch (edge.type) {
          case EdgeType.AND: stroke = '#00a8ff'; break;
          case EdgeType.OR: stroke = '#9c88ff'; break;
          case EdgeType.NOT: stroke = '#e84118'; break;
          case EdgeType.SE_ENTAO: stroke = '#fbc531'; break;
          case EdgeType.UNIAO: stroke = '#4cd137'; break;
          case EdgeType.ATRIBUICAO: stroke = '#e1b12c'; break;
          case EdgeType.CORRENTE: stroke = '#8c7ae6'; break;
          case EdgeType.XOR: stroke = '#e84118'; break;
        }
      }
      
      const pillColor = stroke;

      switch (edge.type) {
        case EdgeType.AND:
          // "--" conectividade e adição: just a simple line
          break;
        case EdgeType.OR:
          // "<==>"
          isDoubleLine = true;
          startMarker = <polygon points="6,-5 -4,0 6,5" fill={stroke} />;
          endMarker = <polygon points="-6,-5 4,0 -6,5" fill={stroke} />;
          break;
        case EdgeType.ATRIBUICAO:
          // "==c" atribuição
          isDoubleLine = true;
          endMarker = <path d="M 4,-5 A 5,5 0 0,0 4,5" fill="none" stroke={stroke} strokeWidth="2" />;
          break;
        case EdgeType.XOR:
          // "<-->"
          startMarker = <polygon points="6,-5 -4,0 6,5" fill={stroke} />;
          endMarker = <polygon points="-6,-5 4,0 -6,5" fill={stroke} />;
          break;
        case EdgeType.CORRENTE:
          // "==" depender dos gatilhos
          isDoubleLine = true;
          break;
        case EdgeType.SE_ENTAO:
          // "-->" se/então
          endMarker = <polygon points="-6,-5 4,0 -6,5" fill={stroke} />;
          break;
        case EdgeType.NOT: 
          endMarker = <path d="M -5,-5 L 5,5 M -5,5 L 5,-5" stroke={stroke} strokeWidth="2" fill="none" />;
          break;
        case EdgeType.UNIAO: 
          strokeWidth = 4;
          break;
      }

      const nx = -dy / length;
      const ny = dx / length;
      const offset = 2.5;

      return (
        <g key={edge.id}>
          {isDoubleLine ? (
            <>
              <line x1={startX + nx*offset} y1={startY + ny*offset} x2={endX + nx*offset} y2={endY + ny*offset} stroke={stroke} strokeWidth="2" style={{ pointerEvents: 'none', filter: viewMode ? `drop-shadow(0 0 5px ${stroke})` : 'none', opacity: viewMode ? 0.8 : 1 }} />
              <line x1={startX - nx*offset} y1={startY - ny*offset} x2={endX - nx*offset} y2={endY - ny*offset} stroke={stroke} strokeWidth="2" style={{ pointerEvents: 'none', filter: viewMode ? `drop-shadow(0 0 5px ${stroke})` : 'none', opacity: viewMode ? 0.8 : 1 }} />
            </>
          ) : (
            <line x1={startX} y1={startY} x2={endX} y2={endY} stroke={stroke} strokeWidth={strokeWidth} style={{ pointerEvents: 'none', filter: viewMode ? `drop-shadow(0 0 5px ${stroke})` : 'none', opacity: viewMode ? 0.8 : 1 }} />
          )}
          
          {startMarker && <g transform={`translate(${startX}, ${startY}) rotate(${angle})`} style={{ pointerEvents: 'none', filter: viewMode ? `drop-shadow(0 0 5px ${stroke})` : 'none' }}>{startMarker}</g>}
          {endMarker && <g transform={`translate(${endX}, ${endY}) rotate(${angle})`} style={{ pointerEvents: 'none', filter: viewMode ? `drop-shadow(0 0 5px ${stroke})` : 'none' }}>{endMarker}</g>}
          
          {!viewMode && onEdgeClick && (
            <g className="interactive-element" onClick={(e) => { e.stopPropagation(); onEdgeClick(edge); }} transform={`translate(${midX - 15}, ${midY})`}>
              <rect x="-22" y="-12" width="44" height="24" rx="12" fill="#1e272e" stroke={pillColor} strokeWidth="2" />
              <text textAnchor="middle" dy=".3em" fill="#fff" fontSize="10" fontWeight="bold" style={{ pointerEvents: 'none' }}>{EdgeSymbols[edge.type]}</text>
            </g>
          )}

          {!viewMode && onEdgeDelete && (
            <g className="interactive-element" onClick={(e) => { e.stopPropagation(); onEdgeDelete(edge); }} transform={`translate(${midX + 22}, ${midY})`}>
              <circle r="10" fill="#e84118" stroke="#fff" strokeWidth="1" />
              <text textAnchor="middle" dy=".3em" fill="#fff" fontSize="10" fontWeight="bold" style={{ pointerEvents: 'none' }}>X</text>
            </g>
          )}
        </g>
      );
    };

    const MiniatureCanvas = ({ graph, radius, auraColor = '#00a8ff', orbitDash = 'none', edgeColorMode = 'auto', customEdgeColor = '#00a8ff', isGlobalRotating = false, globalRotationSpeed = '120s' }) => {
      if (!graph || !graph.nodes) return null;
      
      const maxLayer = useMemo(() => {
        let max = 1;
        graph.nodes.forEach(n => { if (n.type !== NodeType.CORE && n.layer > max) max = n.layer; });
        return max;
      }, [graph]);
      
      const baseRadius = 130; 
      const layerSpacing = 100; 
      const maxOrbitRadius = baseRadius + ((maxLayer - 1) * layerSpacing);
      const originalRadius = maxOrbitRadius + 60;
      
      const scale = (radius * 0.85) / originalRadius;

      const coreNode = graph.nodes.find(n => n.type === NodeType.CORE);
      const nodePositions = new Map();

      if (coreNode) nodePositions.set(coreNode.id, { x: 0, y: 0 });

      for (let L = 1; L <= maxLayer; L++) {
        const nodesInLayer = graph.nodes.filter(n => n.type !== NodeType.CORE && n.layer === L);
        const currentRadius = baseRadius + ((L - 1) * layerSpacing);
        const numOrbiting = nodesInLayer.length;
        
        nodesInLayer.forEach((node, index) => {
          const angle = (index * (360 / numOrbiting)) - 90 + (node.angleOffset || 0); 
          const radians = (angle * Math.PI) / 180;
          nodePositions.set(node.id, { x: currentRadius * Math.cos(radians), y: currentRadius * Math.sin(radians) });
        });
      }

      const orbitRings = [];
      for (let L = 1; L <= maxLayer; L++) { orbitRings.push(baseRadius + ((L - 1) * layerSpacing)); }

      return (
        <g transform={`scale(${scale})`}>
          <g className={isGlobalRotating ? "spin-ring-slow" : ""} style={{ transformOrigin: `0px 0px`, animationDuration: isGlobalRotating ? globalRotationSpeed : undefined }}>
          {orbitRings.map((r, i) => (
            <g key={`orb_${i}`}>
              <circle cx={0} cy={0} r={r - 45} stroke={auraColor} strokeWidth="2" fill="none" opacity="0.5" strokeDasharray={orbitDash} className={i % 2 === 0 ? "spin-ring" : "spin-ring-fast"} />
              <circle cx={0} cy={0} r={r + 45} stroke={auraColor} strokeWidth="1" fill="none" opacity="0.3" strokeDasharray={orbitDash} className={i % 2 === 0 ? "spin-ring-fast" : "spin-ring"} />
            </g>
          ))}

          {graph.edges.map(edge => {
            const pos1 = nodePositions.get(edge.sourceId);
            const pos2 = nodePositions.get(edge.targetId);
            if (!pos1 || !pos2) return null;
            const r1 = getNodeRadius(graph, edge.sourceId);
            const r2 = getNodeRadius(graph, edge.targetId);
            return <EdgeVisual key={edge.id} edge={edge} pos1={pos1} pos2={pos2} r1={r1} r2={r2} viewMode={true} edgeColorMode={edgeColorMode} customEdgeColor={customEdgeColor} />;
          })}

          {graph.nodes.map(node => {
            const pos = nodePositions.get(node.id);
            if (!pos) return null;
            
            if (node.type === NodeType.CORE) {
              let coreColor = '#00a8ff';
              if(node.element === CoreElement.FOGO) coreColor = '#e84118';
              if(node.element === CoreElement.TERRA) coreColor = '#c23616';
              if(node.element === CoreElement.AR) coreColor = '#dff9fb';
              if(node.element === CoreElement.AGUA) coreColor = '#0097e6';
              if(node.element === CoreElement.LUZ) coreColor = '#fbc531';
              if(node.element === CoreElement.SOMBRA) coreColor = '#2f3640';
              if(node.element === CoreElement.COMPOR) coreColor = '#4cd137';
              if(node.element === CoreElement.DECOMPOR) coreColor = '#8c7ae6';
              return (
                <g key={node.id} transform={`translate(${pos.x}, ${pos.y})`}>
                  <circle r={45} fill="#192a56" stroke={coreColor} strokeWidth="4" />
                  <text textAnchor="middle" dy="-0.1em" fill="#fff" fontSize="36" style={{fontFamily: 'Times New Roman'}}>{CoreRunes[node.element]}</text>
                </g>
              );
            }
            if (node.type === NodeType.ADDITIVE) {
              return (
               <g key={node.id} transform={`translate(${pos.x}, ${pos.y})`}>
                 <circle r={35} fill="#2f3640" stroke="#7f8fa6" strokeWidth="3" />
                 <text textAnchor="middle" dy="0.1em" fill="#e1b12c" fontSize="30" style={{fontFamily: 'Times New Roman'}}>{AdditiveRunes[node.additiveType]}</text>
               </g>
              );
            }
            if (node.type === NodeType.SUBCIRCLE || node.type === NodeType.KERNEL) {
              const isK = node.type === NodeType.KERNEL;
              const subStroke = isK ? "#00d2ff" : "#e84393";
              const subFill = isK ? "#000" : "#111";
              return (
                <g key={node.id} transform={`translate(${pos.x}, ${pos.y})`}>
                  {isK ? (
                    <polygon points="45,0 22.5,39 -22.5,39 -45,0 -22.5,-39 22.5,-39" fill={subFill} stroke={subStroke} strokeWidth="4" filter="url(#strongNeon)" className="kernel-pulse" />
                  ) : (
                    <circle r={45} fill={subFill} stroke={subStroke} strokeWidth="4" strokeDasharray="none" />
                  )}
                  {isK && <polygon points="51,0 25.5,44 -25.5,44 -51,0 -25.5,-44 25.5,-44" fill="none" stroke={subStroke} strokeWidth="2" opacity="0.5" className="spin-ring" style={{ transformOrigin: '0 0' }} />}
                  {!isK && <circle r={51} fill="none" stroke={subStroke} strokeWidth="2" opacity="0.5" />}
                  <MiniatureCanvas graph={node.magicGraph} radius={45} auraColor={isK ? subStroke : auraColor} orbitDash={orbitDash} edgeColorMode={edgeColorMode} customEdgeColor={customEdgeColor} isGlobalRotating={isGlobalRotating} globalRotationSpeed={globalRotationSpeed} />
                  {isK ? <polygon points="45,0 22.5,39 -22.5,39 -45,0 -22.5,-39 22.5,-39" fill="rgba(0,0,0,0.1)" stroke="none" /> : <circle r={45} fill="rgba(0,0,0,0.1)" stroke="none" />}
                </g>
              );
            }
          })}
          </g>
        </g>
      );
    };

    const MagicCanvas = ({ graph, viewMode, onNodeClick, onNodeDelete, onLayerChange, onAngleChange, onEdgeClick, onEdgeDelete, onKernelToggle, onBackgroundClick, selectedNodeId, auraColor = '#00a8ff', orbitDash = 'none', edgeColorMode = 'auto', customEdgeColor = '#00a8ff', isGlobalRotating = false, globalRotationSpeed = '120s' }) => {
      const maxLayer = useMemo(() => {
        let max = 1;
        graph.nodes.forEach(n => { if (n.type !== NodeType.CORE && n.layer > max) max = n.layer; });
        return max;
      }, [graph]);

      const baseRadius = 130; 
      const layerSpacing = 100; 
      const maxOrbitRadius = baseRadius + ((maxLayer - 1) * layerSpacing);
      const canvasSize = (maxOrbitRadius + 150) * 2; 
      
      const centerX = canvasSize / 2;
      const centerY = canvasSize / 2;
      const innerShieldRadius = 70;

      const coreNode = graph.nodes.find(n => n.type === NodeType.CORE);
      const nodePositions = new Map();

      if (coreNode) nodePositions.set(coreNode.id, { x: centerX, y: centerY });

      for (let L = 1; L <= maxLayer; L++) {
        const nodesInLayer = graph.nodes.filter(n => n.type !== NodeType.CORE && n.layer === L);
        const currentRadius = baseRadius + ((L - 1) * layerSpacing);
        const numOrbiting = nodesInLayer.length;
        
        nodesInLayer.forEach((node, index) => {
          const angle = (index * (360 / numOrbiting)) - 90 + (node.angleOffset || 0); 
          const radians = (angle * Math.PI) / 180;
          nodePositions.set(node.id, { x: centerX + currentRadius * Math.cos(radians), y: centerY + currentRadius * Math.sin(radians) });
        });
      }

      const orbitRings = [];
      for (let L = 1; L <= maxLayer; L++) { orbitRings.push(baseRadius + ((L - 1) * layerSpacing)); }

      return (
        <svg 
          viewBox={`0 0 ${canvasSize} ${canvasSize}`}
          width="100%" 
          height="100%"
          style={{ cursor: (selectedNodeId && !viewMode) ? 'crosshair' : 'default', transition: 'all 0.5s', touchAction: 'none', display: 'block' }}
          onClick={viewMode ? null : onBackgroundClick}
        >
          <defs>
            <filter id="neon"><feGaussianBlur stdDeviation="4" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="strongNeon"><feGaussianBlur stdDeviation="6" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="selectedGlow"><feGaussianBlur stdDeviation="8" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <linearGradient id="kernelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style={{stopColor: '#00d2ff', stopOpacity: 0.3}} />
              <stop offset="100%" style={{stopColor: '#000', stopOpacity: 1}} />
            </linearGradient>
          </defs>

          <rect width="100%" height="100%" fill="transparent" />

          <g className={viewMode && isGlobalRotating ? "spin-ring-slow" : ""} style={{ transformOrigin: `${centerX}px ${centerY}px`, animationDuration: isGlobalRotating ? globalRotationSpeed : undefined }}>

          {orbitRings.map((r, i) => (
            <g key={`orbit_${i}`} style={{ pointerEvents: 'none' }}>
              {viewMode ? (
                <>
                  <circle cx={centerX} cy={centerY} r={r - 45} stroke={auraColor} strokeWidth="2" fill="none" opacity="0.5" strokeDasharray={orbitDash} className={i % 2 === 0 ? "spin-ring" : "spin-ring-fast"} style={{ transformOrigin: `${centerX}px ${centerY}px` }} />
                  <circle cx={centerX} cy={centerY} r={r + 45} stroke={auraColor} strokeWidth="1" fill="none" opacity="0.3" strokeDasharray={orbitDash} className={i % 2 === 0 ? "spin-ring-fast" : "spin-ring"} style={{ transformOrigin: `${centerX}px ${centerY}px` }} />
                </>
              ) : (
                <>
                  <circle cx={centerX} cy={centerY} r={r - 45} stroke="#2f3640" strokeWidth="1" fill="none" strokeDasharray="5,15" />
                  <circle cx={centerX} cy={centerY} r={r + 45} stroke="#2f3640" strokeWidth="1" fill="none" strokeDasharray="5,15" />
                </>
              )}
              {!viewMode && <text x={centerX} y={centerY - r + 3} fill="#485460" fontSize="10" textAnchor="middle">Camada {i + 1}</text>}
            </g>
          ))}

          <g style={{ pointerEvents: 'none' }}>
            <circle cx={centerX} cy={centerY} r={maxOrbitRadius + 60} stroke={viewMode ? auraColor : "#192a56"} strokeWidth="2" fill={viewMode ? "rgba(0, 168, 255, 0.03)" : "rgba(0, 168, 255, 0.01)"} strokeDasharray={viewMode ? orbitDash : "15,10"} className={viewMode ? "spin-ring-fast" : ""} style={{ transformOrigin: `${centerX}px ${centerY}px`, opacity: viewMode ? 0.6 : 1 }} />
            {viewMode && <circle cx={centerX} cy={centerY} r={maxOrbitRadius + 66} stroke={auraColor} strokeWidth="1" fill="none" opacity="0.4" strokeDasharray={orbitDash} className="spin-ring" style={{ transformOrigin: `${centerX}px ${centerY}px` }} />}
            
            {!viewMode && <circle cx={centerX} cy={centerY} r={maxOrbitRadius + 55} stroke="#353b48" strokeWidth="1" fill="none" />}
          </g>

          {graph.edges.map(edge => {
            const pos1 = nodePositions.get(edge.sourceId);
            const pos2 = nodePositions.get(edge.targetId);
            if (!pos1 || !pos2) return null;
            const r1 = getNodeRadius(graph, edge.sourceId);
            const r2 = getNodeRadius(graph, edge.targetId);
            return <EdgeVisual key={edge.id} edge={edge} pos1={pos1} pos2={pos2} r1={r1} r2={r2} viewMode={viewMode} edgeColorMode={edgeColorMode} customEdgeColor={customEdgeColor} onEdgeClick={onEdgeClick} onEdgeDelete={onEdgeDelete} />;
          })}

          {graph.nodes.filter(n => n.type !== NodeType.CORE).map(node => {
            const pos = nodePositions.get(node.id);
            if (!pos) return null;

            const isSelected = selectedNodeId === node.id && !viewMode;
            const selectionGlow = isSelected ? <circle r={65} fill="rgba(251, 197, 49, 0.1)" stroke="#fbc531" strokeWidth="3" filter="url(#selectedGlow)" style={{ pointerEvents: 'none' }} /> : null;

            let visual = null;

            if (node.type === NodeType.ADDITIVE) {
              visual = (
                <g>
                  {!viewMode && <circle r={35} fill="#2f3640" stroke="#7f8fa6" strokeWidth="2" />}
                  {viewMode && <circle r={35} fill="#050505" stroke="none" />}
                  
                  {/* Container da runa pode rotacionar individualmente se quisermos futuramente, mas a prop é angleOffset */}
                  <g>
                    <text textAnchor="middle" dy={viewMode ? "0.3em" : "0.1em"} fill="#e1b12c" fontSize={viewMode ? "36" : "24"} style={{ fontFamily: 'Times New Roman', pointerEvents: 'none', filter: viewMode ? 'drop-shadow(0 0 10px #e1b12c)' : 'drop-shadow(0 0 5px rgba(225, 177, 44, 0.5))' }}>
                      {AdditiveRunes[node.additiveType]}
                    </text>
                  </g>
                  {!viewMode && (
                    <text textAnchor="middle" dy="2.5em" fill="#7f8fa6" fontSize="6" fontWeight="bold" style={{ pointerEvents: 'none' }}>
                      {node.additiveType.replace('_', ' ')}
                    </text>
                  )}
                </g>
              );
            }
            else if (node.type === NodeType.SUBCIRCLE || node.type === NodeType.KERNEL) {
              const isK = node.type === NodeType.KERNEL;
              const subStroke = isK ? "#00d2ff" : "#e84393";
              const subFill = viewMode ? "#050505" : (isK ? "url(#kernelGradient)" : "#111");
              
              visual = (
                <g>
                   {isK ? (
                     <polygon points="45,0 22.5,39 -22.5,39 -45,0 -22.5,-39 22.5,-39" fill={subFill} stroke={subStroke} strokeWidth="3" filter="url(#strongNeon)" className={viewMode ? "kernel-pulse" : ""} />
                   ) : (
                     <circle r={45} fill={subFill} stroke="#e84393" strokeWidth={viewMode ? "2" : "2"} strokeDasharray={viewMode ? "none" : "8,4"} filter="url(#neon)" className={viewMode ? "spin-ring-fast" : ""} style={{ transformOrigin: '0 0' }}/>
                   )}
                  
                  {viewMode && (
                    isK ? (
                       <polygon points="49,0 24.5,42.5 -24.5,42.5 -49,0 -24.5,-42.5 24.5,-42.5" fill="none" stroke={subStroke} strokeWidth="2" opacity="0.5" className="spin-ring" style={{ transformOrigin: '0 0' }} />
                    ) : (
                       <circle r={49} fill="none" stroke="#e84393" strokeWidth="1" opacity="0.4" className="spin-ring" style={{ transformOrigin: '0 0' }}/>
                    )
                  )}
                  <MiniatureCanvas graph={node.magicGraph} radius={viewMode ? 55 : 45} auraColor={isK ? subStroke : auraColor} orbitDash={orbitDash} edgeColorMode={edgeColorMode} customEdgeColor={customEdgeColor} />
                  {isK ? <polygon points="45,0 22.5,39 -22.5,39 -45,0 -22.5,-39 22.5,-39" fill="rgba(0,0,10,0.2)" stroke="none" /> : <circle r={45} fill="rgba(0,0,0,0.1)" stroke="none" />}
                </g>
              );
            }

            return (
              <g key={node.id} transform={`translate(${pos.x}, ${pos.y})`}>
                {selectionGlow}
                
                <g 
                  className={viewMode ? "" : "interactive-element"} 
                  onClick={(e) => { if(!viewMode) { e.preventDefault(); e.stopPropagation(); onNodeClick && onNodeClick(node); } }}
                  onTouchStart={(e) => { if(!viewMode) { e.preventDefault(); e.stopPropagation(); onNodeClick && onNodeClick(node); } }}
                >
                  <circle r={60} fill="transparent" />
                  {visual}
                </g>
              </g>
            );
          })}

            <g style={{ pointerEvents: 'none' }}>
              {!viewMode && <circle cx={centerX} cy={centerY} r={innerShieldRadius} stroke="#353b48" strokeWidth="3" fill="none" />}
              <circle cx={centerX} cy={centerY} r={innerShieldRadius - 5} stroke={viewMode ? auraColor : "#2f3640"} strokeWidth="2" fill={viewMode ? "#050505" : "rgba(0,0,0,0.6)"} strokeDasharray={viewMode ? orbitDash : "4,4"} className={viewMode ? "spin-ring" : ""} style={{ transformOrigin: `${centerX}px ${centerY}px` }} />
              {viewMode && <circle cx={centerX} cy={centerY} r={innerShieldRadius - 10} stroke={auraColor} strokeWidth="1" fill="none" opacity="0.4" strokeDasharray={orbitDash} className="spin-ring-fast" style={{ transformOrigin: `${centerX}px ${centerY}px` }} />}
            </g>

            {graph.nodes.filter(n => n.type === NodeType.CORE).map(node => {
              const pos = nodePositions.get(node.id);
              if (!pos) return null;
              const isSelected = selectedNodeId === node.id && !viewMode;
              const selectionGlow = isSelected ? <circle r={65} fill="rgba(251, 197, 49, 0.1)" stroke="#fbc531" strokeWidth="3" filter="url(#selectedGlow)" style={{ pointerEvents: 'none' }} /> : null;
              let coreColor = '#00a8ff';
              if(node.element === CoreElement.FOGO) coreColor = '#e84118';
              if(node.element === CoreElement.TERRA) coreColor = '#c23616';
              if(node.element === CoreElement.AR) coreColor = '#dff9fb';
              if(node.element === CoreElement.AGUA) coreColor = '#0097e6';
              if(node.element === CoreElement.LUZ) coreColor = '#fbc531';
              if(node.element === CoreElement.SOMBRA) coreColor = '#2f3640';
              if(node.element === CoreElement.COMPOR) coreColor = '#4cd137';
              if(node.element === CoreElement.DECOMPOR) coreColor = '#8c7ae6';

              return (
                <g key={node.id} transform={`translate(${pos.x}, ${pos.y})`}>
                  {selectionGlow}
                  <g 
                    className={!viewMode ? "interactive-element" : ""} 
                    onClick={(e) => { if(!viewMode) { e.preventDefault(); e.stopPropagation(); onNodeClick && onNodeClick(node); } }}
                    onTouchStart={(e) => { if(!viewMode) { e.preventDefault(); e.stopPropagation(); onNodeClick && onNodeClick(node); } }}
                  >
                    <circle r={viewMode ? 70 : 60} fill="transparent" /> {/* Hit area expansion */}
                    <circle r={viewMode ? 60 : 45} fill={viewMode ? "#050505" : "#192a56"} stroke={viewMode ? "none" : coreColor} strokeWidth="4" filter={viewMode ? "none" : "url(#neon)"} />
                    {viewMode && <circle r={60} fill="transparent" stroke={coreColor} strokeWidth="1" strokeDasharray="8,8" className="spin-ring" style={{ transformOrigin: '0 0' }} />}
                    <text textAnchor="middle" dy={viewMode ? "0.35em" : "-0.1em"} fill={viewMode ? coreColor : "#fff"} fontSize={viewMode ? "42" : "24"} style={{ fontFamily: 'Times New Roman', pointerEvents: 'none', filter: viewMode ? `drop-shadow(0 0 15px ${coreColor})` : 'none' }}>
                      {CoreRunes[node.element]}
                    </text>
                    {!viewMode && (
                      <text textAnchor="middle" dy="2.2em" fill={coreColor} fontSize="8" fontWeight="bold" style={{ pointerEvents: 'none' }}>
                        {node.element}
                      </text>
                    )}
                  </g>
                </g>
              );
            })}
          </g>
        </svg>
      );
    };

    const getNestedGraph = (graph, path) => {
      let current = graph;
      for (const id of path) {
        const node = current.nodes.find(n => n.id === id);
        if (node && node.magicGraph) current = node.magicGraph;
        else return null; 
      }
      return current;
    };

    const updateNestedGraph = (graph, path, newNestedGraph) => {
      if (path.length === 0) return newNestedGraph;
      const newGraph = { ...graph, nodes: [...graph.nodes] };
      const nextId = path[0];
      const nodeIndex = newGraph.nodes.findIndex(n => n.id === nextId);
      if (nodeIndex !== -1) {
        const node = newGraph.nodes[nodeIndex];
        newGraph.nodes[nodeIndex] = { ...node, magicGraph: updateNestedGraph(node.magicGraph, path.slice(1), newNestedGraph) };
      }
      return newGraph;
    };

    const App = () => {
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [mainGraph, setMainGraph] = useState(() => {
        try {
          const saved = localStorage.getItem('autosave_spell');
          return saved ? JSON.parse(saved) : { nodes: [], edges: [] };
        } catch (e) {
          return { nodes: [], edges: [] };
        }
      });
      const [path, setPath] = useState([]); 
      const [isDragOver, setIsDragOver] = useState(false);
      const [selectedNodeId, setSelectedNodeId] = useState(null);
      const [viewMode, setViewMode] = useState(false);
      
      const [spellId, setSpellId] = useState(`spell_${Date.now()}`);
      const [spellName, setSpellName] = useState('Feitiço Sem Nome');
      const [spellComments, setSpellComments] = useState('');
      const [isGrimoireOpen, setIsGrimoireOpen] = useState(false);
      const [savedSpells, setSavedSpells] = useState([]);
      const fileInputRef = useRef(null);

      const activeGraph = getNestedGraph(mainGraph, path) || { nodes: [], edges: [] };

      useEffect(() => { setSelectedNodeId(null); }, [path, viewMode]);

      useEffect(() => {
        localStorage.setItem('autosave_spell', JSON.stringify(mainGraph));
      }, [mainGraph]);

      useEffect(() => {
        const stored = localStorage.getItem('grimoire_spells');
        if (stored) setSavedSpells(JSON.parse(stored));
      }, []);

      const saveSpellToGrimoire = () => {
        const newSpell = { id: spellId, name: spellName || 'Feitiço Sem Nome', comments: spellComments, graph: mainGraph, date: new Date().toLocaleDateString() };
        const updatedSpells = savedSpells.filter(s => s.id !== spellId);
        updatedSpells.push(newSpell);
        setSavedSpells(updatedSpells);
        localStorage.setItem('grimoire_spells', JSON.stringify(updatedSpells));
        alert('Magia gravada no Grimório!');
      };

      const loadSpellFromGrimoire = (spell) => {
        setMainGraph(spell.graph); setSpellName(spell.name); setSpellComments(spell.comments || ''); setSpellId(spell.id); setPath([]); setIsGrimoireOpen(false);
      };

      const deleteSpellFromGrimoire = (e, id) => {
        e.stopPropagation();
        const updated = savedSpells.filter(s => s.id !== id);
        setSavedSpells(updated);
        localStorage.setItem('grimoire_spells', JSON.stringify(updated));
      };

      const startNewSpell = () => {
        setMainGraph({ nodes: [], edges: [] }); setSpellName('Novo Feitiço'); setSpellComments(''); setSpellId(`spell_${Date.now()}`); setPath([]); setIsGrimoireOpen(false);
      };

      const exportSpellFile = () => {
        const spellData = JSON.stringify({ name: spellName, comments: spellComments, graph: mainGraph }, null, 2);
        const blob = new Blob([spellData], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${spellName.replace(/\s+/g, '_')}.arcano`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      const importSpellFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = JSON.parse(evt.target.result);
            if (data.graph) {
              setMainGraph(data.graph); setSpellName(data.name || 'Feitiço Importado'); setSpellComments(data.comments || ''); setSpellId(`spell_${Date.now()}`); setPath([]);
            }
          } catch(err) { alert("Arquivo arcano corrompido ou inválido."); }
        };
        reader.readAsText(file);
      };

      const handleDrop = (e) => {
        if (viewMode) return;
        e.preventDefault(); setIsDragOver(false);
        const data = e.dataTransfer.getData('application/json');
        if (!data) return;
        const item = JSON.parse(data);
        let newGraph = { ...activeGraph, nodes: [...activeGraph.nodes], edges: [...activeGraph.edges] };
        const newId = `node_${Date.now()}`;
        
        if (item.type === NodeType.CORE) {
          const existingCoreIndex = newGraph.nodes.findIndex(n => n.type === NodeType.CORE);
          if (existingCoreIndex !== -1) newGraph.nodes[existingCoreIndex] = { ...newGraph.nodes[existingCoreIndex], element: item.name };
          else newGraph.nodes.push({ id: newId, type: NodeType.CORE, element: item.name, layer: 0 });
        } 
        else if (item.type === NodeType.ADDITIVE) newGraph.nodes.push({ id: newId, type: NodeType.ADDITIVE, additiveType: item.name, layer: 1, angleOffset: 0 });
        else if (item.type === NodeType.SUBCIRCLE) newGraph.nodes.push({ id: newId, type: NodeType.SUBCIRCLE, magicGraph: { nodes: [], edges: [] }, layer: 1, angleOffset: 0 });
        else if (item.type === NodeType.KERNEL) newGraph.nodes.push({ id: newId, type: NodeType.KERNEL, additiveType: item.name, magicGraph: { nodes: [], edges: [] }, layer: 1, angleOffset: 0 });
        
        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const handleDragOver = (e) => { if(!viewMode) { e.preventDefault(); setIsDragOver(true); } };
      const handleDragLeave = (e) => { if(!viewMode) { e.preventDefault(); setIsDragOver(false); } };

      const handleDirectAdd = (type, name) => {
        if (viewMode) return;
        if (window.innerWidth <= 1024) setIsSidebarOpen(false);
        const newId = `node_${Date.now()}`;
        let newGraph = { ...activeGraph, nodes: [...activeGraph.nodes], edges: [...activeGraph.edges] };

        if (type === NodeType.CORE) {
          const existingCoreIndex = newGraph.nodes.findIndex(n => n.type === NodeType.CORE);
          if (existingCoreIndex !== -1) newGraph.nodes[existingCoreIndex] = { ...newGraph.nodes[existingCoreIndex], element: name };
          else newGraph.nodes.push({ id: newId, type: NodeType.CORE, element: name, layer: 0 });
        } 
        else if (type === NodeType.ADDITIVE) newGraph.nodes.push({ id: newId, type: NodeType.ADDITIVE, additiveType: name, layer: 1, angleOffset: 0 });
        else if (type === NodeType.SUBCIRCLE) newGraph.nodes.push({ id: newId, type: NodeType.SUBCIRCLE, magicGraph: { nodes: [], edges: [] }, layer: 1, angleOffset: 0 });
        else if (type === NodeType.KERNEL) newGraph.nodes.push({ id: newId, type: NodeType.KERNEL, additiveType: name, magicGraph: { nodes: [], edges: [] }, layer: 1, angleOffset: 0 });

        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const handleNodeClick = (node, navigate = false) => {
        if (viewMode) return;
        if (navigate && (node.type === NodeType.SUBCIRCLE || node.type === NodeType.KERNEL)) { setPath([...path, node.id]); return; }
        if (!selectedNodeId) { setSelectedNodeId(node.id); } 
        else if (selectedNodeId === node.id) { setSelectedNodeId(null); } 
        else {
          const edgeId = `edge_${Date.now()}`;
          const exists = activeGraph.edges.find(e => (e.sourceId === selectedNodeId && e.targetId === node.id) || (e.sourceId === node.id && e.targetId === selectedNodeId));
          if (!exists) {
            const newGraph = { ...activeGraph, edges: [...activeGraph.edges, { id: edgeId, sourceId: selectedNodeId, targetId: node.id, type: EdgeType.AND }] };
            setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
          }
          setSelectedNodeId(null);
        }
      };

      const handleBackgroundClick = () => { setSelectedNodeId(null); };

      const handleLayerChange = (node, delta) => {
        const newLayer = Math.max(1, node.layer + delta);
        const newGraph = { ...activeGraph, nodes: activeGraph.nodes.map(n => n.id === node.id ? { ...n, layer: newLayer } : n) };
        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const handleAngleChange = (node, deltaAngle) => {
        const newGraph = { ...activeGraph, nodes: activeGraph.nodes.map(n => n.id === node.id ? { ...n, angleOffset: (n.angleOffset || 0) + deltaAngle } : n) };
        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const handleNodeDelete = (node) => {
        const newGraph = { nodes: activeGraph.nodes.filter(n => n.id !== node.id), edges: activeGraph.edges.filter(e => e.sourceId !== node.id && e.targetId !== node.id) };
        if (selectedNodeId === node.id) setSelectedNodeId(null);
        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const handleKernelToggle = (node, mode, kernelType) => {
        const newGraph = { ...activeGraph, nodes: activeGraph.nodes.map(n => n.id === node.id ? { ...n, type: mode, additiveType: kernelType } : n) };
        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const handleEdgeClick = (edge) => {
        const currentIndex = EdgeCycle.indexOf(edge.type);
        const nextType = EdgeCycle[(currentIndex + 1) % EdgeCycle.length];
        const newGraph = { ...activeGraph, edges: activeGraph.edges.map(e => e.id === edge.id ? { ...e, type: nextType } : e) };
        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const handleEdgeDelete = (edge) => {
        const newGraph = { ...activeGraph, edges: activeGraph.edges.filter(e => e.id !== edge.id) };
        setMainGraph(updateNestedGraph(mainGraph, path, newGraph));
      };

      const navigateToDepth = (depthIndex) => { setPath(path.slice(0, depthIndex)); };

      const globalAuraColor = mainGraph.auraColor || '#00a8ff';
      const rawOrbitStyle = mainGraph.orbitStyle || 'solid';
      let globalOrbitDash = "none";
      if (rawOrbitStyle === 'dashed') globalOrbitDash = "15,15";
      if (rawOrbitStyle === 'dotted') globalOrbitDash = "4,8";
      const edgeColorMode = mainGraph.edgeColorMode || 'auto';
      const customEdgeColor = mainGraph.customEdgeColor || '#00a8ff';
      const isGlobalRotating = mainGraph.isGlobalRotating || false;

      const selectedNode = activeGraph.nodes.find(n => n.id === selectedNodeId);

      return (
        <div className="app-container" style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden' }}>
          
          {selectedNode && !viewMode && (
            <div className="node-action-bar" key={selectedNode.id}>
              <div className="action-group">
                <div style={{ minWidth: '100px' }}>
                  <div className="action-label">Elemento</div>
                  <div style={{ fontWeight: 'bold', fontSize: '0.9rem', color: '#fff', display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span className="runic-text" style={{ fontSize: '1rem', display: 'inline-block' }}>
                      {selectedNode.type === NodeType.CORE ? CoreRunes[selectedNode.element] : AdditiveRunes[selectedNode.additiveType]}
                    </span>
                    {selectedNode.type === NodeType.CORE ? selectedNode.element : (selectedNode.additiveType || selectedNode.type)}
                  </div>
                </div>
              </div>

              <div className="action-group">
                <div>
                  <div className="action-label">Acões</div>
                  <div className="mini-btn danger" onClick={() => handleNodeDelete(selectedNode)} title="Remover Componente">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                  </div>
                </div>
              </div>

              {selectedNode.type !== NodeType.CORE && (
                <div className="action-group">
                  <div>
                    <div className="action-label">Camada (Raio)</div>
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <div className="mini-btn" onClick={() => handleLayerChange(selectedNode, 1)} title="Aumentar Camada">↑</div>
                      <div className="mini-btn" onClick={() => handleLayerChange(selectedNode, -1)} title="Diminuir Camada">↓</div>
                    </div>
                  </div>
                  <div style={{ marginLeft: '12px' }}>
                    <div className="action-label">Orientação</div>
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <div className="mini-btn" onClick={() => handleAngleChange(selectedNode, -15)} title="Rotacionar Anti-Horário">↶</div>
                      <div className="mini-btn" onClick={() => handleAngleChange(selectedNode, 15)} title="Rotacionar Horário">↷</div>
                    </div>
                  </div>
                </div>
              )}

              {(selectedNode.type === NodeType.SUBCIRCLE || selectedNode.type === NodeType.KERNEL) && (
                <div className="action-group">
                  <div>
                    <div className="action-label">Lógica</div>
                    <div style={{ display: 'flex', gap: '8px' }}>
                      <div className="mini-btn success text-btn" onClick={() => handleNodeClick(selectedNode, true)}>
                        Explorar Subciclo ❯
                      </div>
                      <div className="mini-btn text-btn" 
                        style={{ borderColor: selectedNode.type === NodeType.KERNEL ? '#00d2ff' : '#2ecc71', color: selectedNode.type === NodeType.KERNEL ? '#00d2ff' : '#2ecc71' }} 
                        onClick={() => {
                          const mode = selectedNode.type === NodeType.KERNEL ? NodeType.SUBCIRCLE : NodeType.KERNEL;
                          let kernelType = '';
                          if (mode === NodeType.KERNEL) {
                            const choice = prompt("Selecione a Essência do Buffer (Kernel):\n1. ENTROPIA (Térmico)\n2. MORFOLOGIA (Forma)\n3. ESTADO (Fase Física)\n4. ONDA (Som/Luz)\n5. FORÇA (Física)\n6. VOLUME (Espaço)", "1");
                            const options = ["ENTROPIA", "MORFOLOGIA", "ESTADO", "ONDA", "FORCA", "VOLUME"];
                            kernelType = options[parseInt(choice) - 1] || "ENTROPIA";
                          }
                          handleKernelToggle(selectedNode, mode, kernelType);
                        }}>
                        {selectedNode.type === NodeType.KERNEL ? "Converter para Subciclo" : "Ativar Modo Kernel"}
                      </div>
                    </div>
                  </div>
                </div>
              )}

                <div className="action-group" style={{ opacity: 0.6, fontSize: '0.65rem', fontStyle: 'italic', maxWidth: '160px', lineHeight: '1.2', borderLeft: '1px solid rgba(212, 175, 55, 0.15)', paddingLeft: '20px' }}>
                  <span style={{ color: '#d4af37', display: 'block', marginBottom: '2px' }}>CONSELHO DO ARQUIVISTA:</span>
                  Clique em outro elemento para tecer uma conexão mágica entre eles.
                </div>
            </div>
          )}

          <div className={`sidebar-overlay ${isSidebarOpen ? 'active' : ''}`} onClick={() => setIsSidebarOpen(false)}></div>
          
          <button className="mobile-sidebar-toggle" style={{ display: 'none' }} onClick={() => setIsSidebarOpen(!isSidebarOpen)}>
            {isSidebarOpen ? '✕' : '📜'}
          </button>

          {isGrimoireOpen && (
            <div className="modal-overlay" onClick={() => setIsGrimoireOpen(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <h2 style={{color: '#e1b12c', marginTop: 0}}>📖 O Grimório</h2>
                <p style={{color: '#7f8fa6'}}>Arquivos arcanos salvos neste dispositivo.</p>
                <button className="action-btn primary" style={{marginBottom: '1rem', width: '100%', justifyContent: 'center'}} onClick={startNewSpell}>
                  + Criar Novo Feitiço
                </button>
                {savedSpells.length === 0 ? (
                  <p style={{textAlign: 'center', color: '#555'}}>Nenhum feitiço registrado.</p>
                ) : (
                  savedSpells.map(spell => (
                    <div key={spell.id} className="grimoire-item" onClick={() => loadSpellFromGrimoire(spell)} style={{cursor: 'pointer'}}>
                      <div><p className="grimoire-title">{spell.name}</p><p className="grimoire-date">Catalogado em: {spell.date}</p></div>
                      <button className="action-btn" onClick={(e) => deleteSpellFromGrimoire(e, spell.id)} style={{background: '#e84118', borderColor: '#c23616'}}>X</button>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

          {!viewMode && (
            <div className={`sidebar ${isSidebarOpen ? 'open' : ''}`}>
              <h2 style={{ color: '#d4af37', fontSize: '1.4rem', marginTop: 0, fontFamily: 'Cinzel, serif', textAlign: 'center', borderBottom: '1px solid #3a2f4c', paddingBottom: '10px' }}>CodexARCH v2</h2>
              <p style={{ fontSize: '0.85rem', color: '#8a7d9b', marginBottom: '2rem', textAlign: 'center', fontStyle: 'italic' }}>Toque para adicionar ou pressione e arraste.</p>
              
              <h3 style={{ fontSize: '1.1rem', color: '#ff793f', fontFamily: 'Cinzel, serif', borderLeft: '3px solid #ff793f', paddingLeft: '8px' }}>Núcleo (Elemental)</h3>
              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px'}}>
                {['FOGO', 'AGUA', 'TERRA', 'AR'].map(c => <DraggableItem key={c} type={NodeType.CORE} name={c} className="core-item" onAdd={handleDirectAdd} />)}
              </div>

              <h3 style={{ fontSize: '1.1rem', color: '#f1c40f', marginTop: '1.5rem', fontFamily: 'Cinzel, serif', borderLeft: '3px solid #f1c40f', paddingLeft: '8px' }}>Núcleo (Dualidade)</h3>
              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px'}}>
                {['LUZ', 'SOMBRA', 'COMPOR', 'DECOMPOR'].map(c => <DraggableItem key={c} type={NodeType.CORE} name={c} className="core-item" onAdd={handleDirectAdd} />)}
              </div>
              
              <h3 style={{ fontSize: '1.1rem', color: '#3498db', marginTop: '2rem', fontFamily: 'Cinzel, serif', borderLeft: '3px solid #3498db', paddingLeft: '8px' }}>Aditivos</h3>
              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px'}}>
                {['CONTROLE', 'AUMENTO', 'REDUCAO', 'PONTO', 'MANTER', 'GATILHO', 'ECO'].map(a => <DraggableItem key={a} type={NodeType.ADDITIVE} name={a} onAdd={handleDirectAdd} />)}
              </div>

              <h3 style={{ fontSize: '1.1rem', color: '#fd79a8', marginTop: '2rem', fontFamily: 'Cinzel, serif', borderLeft: '3px solid #fd79a8', paddingLeft: '8px' }}>Subcírculos</h3>
              <DraggableItem type={NodeType.SUBCIRCLE} name="SUBCIRCLE" label="( ) Gerar Subciclo" className="subcircle-item" onAdd={handleDirectAdd} />
            </div>
          )}

          <div className="main-content">
            <div className="top-bar">
              <div className="top-actions" style={{ opacity: viewMode ? 0 : 1, transition: 'opacity 0.3s', pointerEvents: viewMode ? 'none' : 'auto' }}>
                <button className="action-btn" onClick={() => setIsGrimoireOpen(true)}>📖 Grimório</button>
                <button className="action-btn primary" onClick={saveSpellToGrimoire}>💾 Salvar</button>
                <button className="action-btn" onClick={exportSpellFile}>↓ Baixar</button>
                <button className="action-btn" onClick={() => { navigator.clipboard.writeText(JSON.stringify(mainGraph, null, 2)); alert('JSON Arcânico copiado para a área de transferência!'); }}>📄 Copiar JSON</button>
                <button className="action-btn" onClick={() => fileInputRef.current.click()}>↑ Importar</button>
                <input type="file" ref={fileInputRef} style={{display: 'none'}} accept=".arcano,.json" onChange={importSpellFile} />
              </div>
              <button className="toggle-btn" onClick={() => setViewMode(!viewMode)}>
                {viewMode ? '✏️ Voltar à Edição' : '👁 Modo Exibição'}
              </button>
            </div>

            {!viewMode && path.length === 0 && (
              <div className="metadata-inputs">
                <input type="text" className="spell-input" value={spellName} onChange={e => setSpellName(e.target.value)} placeholder="Nome do Feitiço..." />
                <textarea className="spell-textarea" value={spellComments} onChange={e => setSpellComments(e.target.value)} placeholder="Anotações do conjurador, efeitos colaterais ou componentes..." />
                <div className="config-toggles">
                  <div className="config-item">
                    <div className="config-label">Cor da Aura</div>
                    <input type="color" value={globalAuraColor} onChange={e => setMainGraph({...mainGraph, auraColor: e.target.value})} style={{ background: 'none', border: '1px solid rgba(212,175,55,0.4)', borderRadius: '6px', cursor: 'pointer', height: '40px', width: '100%', padding: '2px' }} />
                  </div>
                  
                  <div className="config-item">
                    <div className="config-label">Estilo da Órbita</div>
                    <select value={rawOrbitStyle} onChange={e => setMainGraph({...mainGraph, orbitStyle: e.target.value})} style={{ background: 'rgba(26, 21, 37, 0.8)', color: '#d4af37', border: '1px solid rgba(212,175,55,0.2)', borderRadius: '6px', padding: '10px', outline: 'none', fontFamily: 'Cinzel, serif', fontSize: '0.85rem' }}>
                      <option value="solid">Contínua (Sólida)</option>
                      <option value="dashed">Tracejada (Rúnica)</option>
                      <option value="dotted">Pontilhada (Etérea)</option>
                    </select>
                  </div>
                  
                  <div className="config-item">
                    <div className="config-label">Cálculo de Conexão</div>
                    <div style={{ display: 'flex', gap: '8px' }}>
                      <select value={edgeColorMode} onChange={e => setMainGraph({...mainGraph, edgeColorMode: e.target.value})} style={{ flex: 1, background: 'rgba(26, 21, 37, 0.8)', color: '#d4af37', border: '1px solid rgba(212,175,55,0.2)', borderRadius: '6px', padding: '10px', outline: 'none', fontFamily: 'Cinzel, serif', fontSize: '0.85rem' }}>
                        <option value="auto">Cores por Tipo</option>
                        <option value="custom">Matiz Personalizada</option>
                      </select>
                      {edgeColorMode === 'custom' && (
                        <input type="color" value={customEdgeColor} onChange={e => setMainGraph({...mainGraph, customEdgeColor: e.target.value})} style={{ background: 'none', border: '1px solid rgba(212,175,55,0.4)', borderRadius: '6px', cursor: 'pointer', height: '40px', width: '60px', padding: '2px' }} />
                      )}
                    </div>
                  </div>
                  
                  <div className="config-item" style={{ justifyContent: 'center' }}>
                    <div className="config-label">Mecânica Rúnica</div>
                    <label style={{ display: 'flex', gap: '12px', alignItems: 'center', color: '#c8b99e', fontSize: '0.85rem', fontFamily: 'Cinzel, serif', cursor: 'pointer', background: 'rgba(255,255,255,0.03)', padding: '10px 15px', borderRadius: '8px', border: '1px solid rgba(212,175,55,0.1)', transition: 'all 0.2s' }} className="hover-highlight">
                      <input type="checkbox" checked={isGlobalRotating} onChange={e => setMainGraph({...mainGraph, isGlobalRotating: e.target.checked})} style={{ width: '20px', height: '20px', accentColor: '#d4af37' }} />
                      Cinética (Ativar Rotação)
                    </label>
                  </div>
                </div>
              </div>
            )}
            
            <div className="breadcrumb" style={{ visibility: viewMode && path.length === 0 ? 'hidden' : 'visible', marginBottom: '1rem' }}>
              <span className="breadcrumb-item" onClick={() => !viewMode && navigateToDepth(0)}>Círculo Principal</span>
              {path.map((nodeId, index) => (
                <React.Fragment key={index}>
                  <span className="breadcrumb-separator">❯</span>
                  <span className="breadcrumb-item" onClick={() => !viewMode && navigateToDepth(index + 1)}>Camada {index + 1}</span>
                </React.Fragment>
              ))}
            </div>

            <div className={`canvas-container ${isDragOver ? 'drag-over' : ''} ${!viewMode ? 'editing' : ''}`} onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}>
              <MagicCanvas graph={activeGraph} viewMode={viewMode} onNodeClick={handleNodeClick} onNodeDelete={handleNodeDelete} onLayerChange={handleLayerChange} onAngleChange={handleAngleChange} onEdgeClick={handleEdgeClick} onEdgeDelete={handleEdgeDelete} onKernelToggle={handleKernelToggle} onBackgroundClick={handleBackgroundClick} selectedNodeId={selectedNodeId} auraColor={globalAuraColor} orbitDash={globalOrbitDash} edgeColorMode={edgeColorMode} customEdgeColor={customEdgeColor} isGlobalRotating={isGlobalRotating} globalRotationSpeed={mainGraph.globalRotationSpeed || '120s'} />
            </div>

            <div className="codex-panel" style={{ display: viewMode ? 'none' : 'block', marginTop: '2rem', border: '1px solid rgba(212, 175, 55, 0.4)', boxShadow: '0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(212,175,55,0.1)', padding: '30px', borderRadius: '12px', width: '100%', boxSizing: 'border-box' }}>
              <h3 style={{ color: '#d4af37', marginTop: 0, marginBottom: '2rem', fontFamily: 'Cinzel, serif', fontSize: '1.4rem', borderBottom: '1px solid rgba(212, 175, 55, 0.2)', paddingBottom: '15px', display: 'flex', alignItems: 'center', gap: '12px', letterSpacing: '2px', textTransform: 'uppercase' }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                Tradução do Relatório
              </h3>
              <div style={{ margin: 0 }}>
                <MagicTranslator graph={mainGraph} />
              </div>
            </div>

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
